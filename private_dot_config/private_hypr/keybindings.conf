###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more

# ─── App Shortcuts ────────────────────────────────────────────────────────────
$l=Launchers
$d=[$l|Apps]
bindd = $mainMod, T, $d Launch Terminal, exec, $terminal
bindd = $mainMod, E, $d Open File Manager, exec, $fileManager
bindd = $mainMod, B, $d Open Web Browser, exec, $webBrowser

$d=[$l|Rofi Menus]
bindd = $mainMod, Space, $d Open App Launcher, exec, $menu
bindd = $mainMod, K, $d List Keybindings, exec, rofi -show keys
bindd = $mainMod, V, $d Open Clipboard History, exec, rofi -show clipboard

# ─── Window Management ────────────────────────────────────────────────────────
$wm=Window Management
$d=[$wm]
bindd = $mainMod, Q, $d Close Active Window, killactive,
bindd = $mainMod, Escape, $d Exit Hyprland Session, exit,
bindd = $mainMod, W, $d Toggle Floating State, togglefloating,
bindd = $mainMod, P, $d Toggle Pseudo-Tiling, pseudo,
bindd = $mainMod, J, $d Toggle Split Direction, togglesplit,
bindd = $mainMod, F, $d Toggle Fullscreen, fullscreen,
bindd = $mainMod, O, $d Toggle Window Opacity, tagwindow, opaque

$d=[$wm|Focus]
bindd = $mainMod, left, $d Focus Window Left, movefocus, l
bindd = $mainMod, right, $d Focus Window Right, movefocus, r
bindd = $mainMod, up, $d Focus Window Up, movefocus, u
bindd = $mainMod, down, $d Focus Window Down, movefocus, d
bindd = ALT, Tab, $d Cycle Next Window, cyclenext,
bindd = ALT, Tab, $d Bring Active to Top, bringactivetotop

$d=[$wm|Resize]
bindd = $mainMod, R, $d Enter Resize Mode, submap, resize

submap = resize
bindde = , right, $d Increase Width, resizeactive, 30 0
bindde = , left, $d Decrease Width, resizeactive, -30 0
bindde = , up, $d Decrease Height, resizeactive, 0 -30
bindde = , down, $d Increase Height, resizeactive, 0 30
bind = , escape, submap, reset
bind = , catchall, submap, reset
submap = reset

$d=[$wm|Move]
binddm = $mainMod, mouse:272, $d Drag to Move Window, movewindow
binddm = $mainMod, mouse:273, $d Drag to Resize Window, resizewindow
bindd = $mainMod SHIFT, left, $d Swap Window Left, movewindow, l
bindd = $mainMod SHIFT, right, $d Swap Window Right, movewindow, r
bindd = $mainMod SHIFT, up, $d Swap Window Up, movewindow, u
bindd = $mainMod SHIFT, down, $d Swap Window Down, movewindow, d

# ─── Workspaces ───────────────────────────────────────────────────────────────
$ws=Workspaces
$d=[$ws|Navigation]
bindd = $mainMod, 1, $d Switch to Workspace 1, workspace, 1
bindd = $mainMod, 2, $d Switch to Workspace 2, workspace, 2
bindd = $mainMod, 3, $d Switch to Workspace 3, workspace, 3
bindd = $mainMod, 4, $d Switch to Workspace 4, workspace, 4
bindd = $mainMod, 5, $d Switch to Workspace 5, workspace, 5
bindd = $mainMod, 6, $d Switch to Workspace 6, workspace, 6
bindd = $mainMod, 7, $d Switch to Workspace 7, workspace, 7
bindd = $mainMod, 8, $d Switch to Workspace 8, workspace, 8
bindd = $mainMod, 9, $d Switch to Workspace 9, workspace, 9
bindd = $mainMod, 0, $d Switch to Workspace 10, workspace, 10

bindd = $mainMod CTRL, right, $d Next Workspace, workspace, r+1
bindd = $mainMod CTRL, left, $d Previous Workspace, workspace, r-1
bindd = $mainMod CTRL, mouse_down, $d Next Workspace (Scroll), exec, hyprctl dispatch workspace e+1
bindd = $mainMod CTRL, mouse_up, $d Previous Workspace (Scroll), exec, hyprctl dispatch workspace e-1
bindd = $mainMod, mouse_down, $d Zoom In Desktop, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | grep float | awk '{print $2 + 0.1}')
bindd = $mainMod, mouse_up, $d Zoom Out Desktop, exec, hyprctl keyword cursor:zoom_factor $(hyprctl getoption cursor:zoom_factor | grep float | awk '{print $2 - 0.1}')
bindd = $mainMod, mouse:274, $d Reset Desktop Zoom, exec, hyprctl keyword cursor:zoom_factor 1.0

$d=[$ws|Move Window]
bindd = $mainMod CTRL ALT, 1, $d Move Window to WS 1, movetoworkspace, 1
bindd = $mainMod CTRL ALT, 2, $d Move Window to WS 2, movetoworkspace, 2
bindd = $mainMod CTRL ALT, 3, $d Move Window to WS 3, movetoworkspace, 3
bindd = $mainMod CTRL ALT, 4, $d Move Window to WS 4, movetoworkspace, 4
bindd = $mainMod CTRL ALT, 5, $d Move Window to WS 5, movetoworkspace, 5
bindd = $mainMod CTRL ALT, 6, $d Move Window to WS 6, movetoworkspace, 6
bindd = $mainMod CTRL ALT, 7, $d Move Window to WS 7, movetoworkspace, 7
bindd = $mainMod CTRL ALT, 8, $d Move Window to WS 8, movetoworkspace, 8
bindd = $mainMod CTRL ALT, 9, $d Move Window to WS 9, movetoworkspace, 9
bindd = $mainMod CTRL ALT, 0, $d Move Window to WS 10, movetoworkspace, 10

bindd = $mainMod CTRL ALT, left, $d Move Window to Previous WS, movetoworkspace, r-1
bindd = $mainMod CTRL ALT, right, $d Move Window to Next WS, movetoworkspace, r+1

$d=[$ws|Special]
bindd = $mainMod, S, $d Toggle Special Workspace, togglespecialworkspace, magic
bindd = $mainMod SHIFT, Z, $d Move Window to Special WS, movetoworkspace, special:magic


# ─── System ───────────────────────────────────────────────────────────────────
$sys=System
$d=[$sys|Power]
bindd = $mainMod, L, $d Lock Screen, exec, loginctl lock-session
bindd = CTRL ALT, Delete, $d Open Logout Menu, exec, wlogout
bindd = $mainMod SHIFT, R, $d Reload Desktop Configuration, exec, $scripts/reload.sh

$d=[$sys|Media]
binddel = ,XF86AudioRaiseVolume, $d Increase Volume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
binddel = ,XF86AudioLowerVolume, $d Decrease Volume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binddel = ,XF86AudioMute, $d Toggle Audio Mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binddel = ,XF86AudioMicMute, $d Toggle Microphone Mute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

binddl = , XF86AudioNext, $d Next Media Track, exec, playerctl next
binddl = , XF86AudioPause, $d Play/Pause Media, exec, playerctl play-pause
binddl = , XF86AudioPlay, $d Play/Pause Media, exec, playerctl play-pause
binddl = , XF86AudioPrev, $d Previous Media Track, exec, playerctl previous

binddel = , F8, $d Open Volume Control, exec, hyprctl dispatch exec '[float; size 800 600; center]' pavucontrol
binddel = , F9, $d Decrease Volume (F-Key), exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binddel = , F10, $d Increase Volume (F-Key), exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+


# ─── Screenshots ──────────────────────────────────────────────────────────────
$ss=Screenshots
$d=[$ss]
bindd = , Print, $d Capture Full Screenshot, exec, grim - | satty -f -
bindd = $mainMod SHIFT, S, $d Capture Region Screenshot, exec, grim -g "$(slurp)" - | satty -f -

$d=#! unset the group name
