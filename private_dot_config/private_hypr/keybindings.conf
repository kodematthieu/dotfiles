###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more

# ─── App Shortcuts ────────────────────────────────────────────────────────────
$l=Launchers
$d=[$l|Apps]
bindd = $mainMod, T, $d Terminal, exec, $terminal
bindd = $mainMod, E, $d File Manager, exec, $fileManager
bindd = $mainMod, B, $d Web Browser, exec, $webBrowser

$d=[$l|Rofi Menus]
bindd = $mainMod, Space, $d App Launcher, exec, $menu
bindd = $mainMod, K, $d Keybinds, exec, rofi -show keys
bindd = $mainMod, V, $d Clipboard, exec, rofi -show clipboard

# ─── Window Management ────────────────────────────────────────────────────────
$wm=Window Management
$d=[$wm]
bindd = $mainMod, Q, $d Close Active Window, killactive,
bindd = $mainMod, Escape, $d Exit Hyprland, exit,
bindd = $mainMod, W, $d Toggle Floating, togglefloating,
bindd = $mainMod, P, $d Dwindle Pseudo, pseudo,
bindd = $mainMod, J, $d Dwindle Split, togglesplit,
bindd = $mainMod, F, $d Toggle Fullscreen, fullscreen,
bindd = $mainMod, O, $d Toggle Opaque, tagwindow, opaque

$d=[$wm|Focus]
bindd = $mainMod, left, $d Focus Left, movefocus, l
bindd = $mainMod, right, $d Focus Right, movefocus, r
bindd = $mainMod, up, $d Focus Up, movefocus, u
bindd = $mainMod, down, $d Focus Down, movefocus, d

$d=[$wm|Resize]
bindde = $mainMod SHIFT, right, $d Resize Right, resizeactive, 30 0
bindde = $mainMod SHIFT, left, $d Resize Left, resizeactive, -30 0
bindde = $mainMod SHIFT, up, $d Resize Up, resizeactive, 0 -30
bindde = $mainMod SHIFT, down, $d Resize Down, resizeactive, 0 30

$d=[$wm|Move]
binddm = $mainMod, mouse:272, $d Move Window, movewindow
binddm = $mainMod, mouse:273, $d Resize Window, resizewindow

# ─── Workspaces ───────────────────────────────────────────────────────────────
$ws=Workspaces
$d=[$ws|Navigation]
bindd = $mainMod, 1, $d Workspace 1, workspace, 1
bindd = $mainMod, 2, $d Workspace 2, workspace, 2
bindd = $mainMod, 3, $d Workspace 3, workspace, 3
bindd = $mainMod, 4, $d Workspace 4, workspace, 4
bindd = $mainMod, 5, $d Workspace 5, workspace, 5
bindd = $mainMod, 6, $d Workspace 6, workspace, 6
bindd = $mainMod, 7, $d Workspace 7, workspace, 7
bindd = $mainMod, 8, $d Workspace 8, workspace, 8
bindd = $mainMod, 9, $d Workspace 9, workspace, 9
bindd = $mainMod, 0, $d Workspace 10, workspace, 10

bindd = $mainMod CTRL, right, $d Next Workspace, workspace, +1
bindd = $mainMod CTRL, left, $d Prev Workspace, workspace, -1
bindd = $mainMod, mouse_down, $d Next Workspace (Scroll), workspace, e+1
bindd = $mainMod, mouse_up, $d Prev Workspace (Scroll), workspace, e-1

$d=[$ws|Move Window]
bindd = $mainMod CTRL ALT, 1, $d Move to WS 1, movetoworkspace, 1
bindd = $mainMod CTRL ALT, 2, $d Move to WS 2, movetoworkspace, 2
bindd = $mainMod CTRL ALT, 3, $d Move to WS 3, movetoworkspace, 3
bindd = $mainMod CTRL ALT, 4, $d Move to WS 4, movetoworkspace, 4
bindd = $mainMod CTRL ALT, 5, $d Move to WS 5, movetoworkspace, 5
bindd = $mainMod CTRL ALT, 6, $d Move to WS 6, movetoworkspace, 6
bindd = $mainMod CTRL ALT, 7, $d Move to WS 7, movetoworkspace, 7
bindd = $mainMod CTRL ALT, 8, $d Move to WS 8, movetoworkspace, 8
bindd = $mainMod CTRL ALT, 9, $d Move to WS 9, movetoworkspace, 9
bindd = $mainMod CTRL ALT, 0, $d Move to WS 10, movetoworkspace, 10

bindd = $mainMod CTRL ALT, left, $d Move to Prev WS, movetoworkspace, r-1
bindd = $mainMod CTRL ALT, right, $d Move to Next WS, movetoworkspace, r+1

$d=[$ws|Special]
bindd = $mainMod, S, $d Toggle Scratchpad, togglespecialworkspace, magic
bindd = $mainMod SHIFT, Z, $d Move to Scratchpad, movetoworkspace, special:magic


# ─── System ───────────────────────────────────────────────────────────────────
$sys=System
$d=[$sys|Power]
bindd = $mainMod, L, $d Lock Screen, exec, loginctl lock-session
bindd = CTRL ALT, Delete, $d Logout Menu, exec, wlogout
bindd = $mainMod SHIFT, R, $d Reload Hyprland, exec, $scripts/reload.sh

$d=[$sys|Media]
binddel = ,XF86AudioRaiseVolume, $d Volume Up, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
binddel = ,XF86AudioLowerVolume, $d Volume Down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binddel = ,XF86AudioMute, $d Mute Audio, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binddel = ,XF86AudioMicMute, $d Mute Mic, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

binddl = , XF86AudioNext, $d Next Track, exec, playerctl next
binddl = , XF86AudioPause, $d Play/Pause, exec, playerctl play-pause
binddl = , XF86AudioPlay, $d Play/Pause, exec, playerctl play-pause
binddl = , XF86AudioPrev, $d Prev Track, exec, playerctl previous

binddel = , F8, $d Volume Control, exec, hyprctl dispatch exec '[float; size 800 600; center]' pavucontrol
binddel = , F9, $d Volume Down, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
binddel = , F10, $d Volume Up, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+


# ─── Screenshots ──────────────────────────────────────────────────────────────
$ss=Screenshots
$d=[$ss]
bindd = , Print, $d Full Screenshot, exec, grim - | satty -f -
bindd = $mainMod SHIFT, S, $d Region Screenshot, exec, grim -g "$(slurp)" - | satty -f -

$d=#! unset the group name
